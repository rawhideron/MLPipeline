---
# ArgoCD Application for MLPipeline
# Manages deployment of the entire ML pipeline including Airflow, FastAPI, PostgreSQL
# 
# Prerequisites:
#   - ArgoCD installed in argocd namespace
#   - kind-reunion cluster accessible
#   - MLPipeline Git repository cloned
#
# Install:
#   kubectl apply -f argocd/mlpipeline-app.yaml
#
# Sync:
#   argocd app sync mlpipeline

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlpipeline
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mlpipeline-project

  # Raw Kubernetes manifests (RBAC, Ingress, Secrets, ConfigMaps)
  source:
    repoURL: https://github.com/rawhideron/MLPipeline
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: mlpipeline

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas

  info:
  - name: 'Documentation'
    value: 'https://github.com/rawhideron/MLPipeline#readme'
  - name: 'Issues'
    value: 'https://github.com/rawhideron/MLPipeline/issues'

---
# AppProject to define access control
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mlpipeline-project
  namespace: argocd
spec:
  destinations:
  - namespace: 'mlpipeline'
    server: https://kubernetes.default.svc
  - namespace: 'argocd'
    server: https://kubernetes.default.svc

  sourceRepos:
  - 'https://github.com/rawhideron/MLPipeline'
  - 'https://charts.bitnami.com/bitnami'
  - 'https://airflow.apache.org'

  roles:
  - name: developers
    policies:
    - p, proj:mlpipeline-project:developers, applications, get, mlpipeline-project/*, allow
    - p, proj:mlpipeline-project:developers, applications, sync, mlpipeline-project/*, allow

  - name: admins
    policies:
    - p, proj:mlpipeline-project:admins, applications, *, mlpipeline-project/*, allow

  - name: ci
    policies:
    - p, proj:mlpipeline-project:ci, applications, sync, mlpipeline-project/*, allow
    - p, proj:mlpipeline-project:ci, applications, get, mlpipeline-project/*, allow

---
# Notification configuration (optional)
# Requires ArgoCD Notifications controller
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.slack: |
    token: $slack-token
  template.app-health-degraded: |
    message: |
      Application {{.app.metadata.name}} health is {{.app.status.health.status}}.
      {{if eq .serviceType "slack"}}:exclamation:{{end}}
    deliveryMethod: slack
    notifyOn:
    - sync_failed
    - health_degraded
