---
# ApplicationSet for MLPipeline Components
# Manages individual components: airflow, fastapi, postgres
# This allows fine-grained control over each component
#
# Install:
#   kubectl apply -f argocd/mlpipeline-appset.yaml
#
# List applications:
#   argocd app list | grep mlpipeline

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mlpipeline-components
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      # Deploy postgres first (syncWave "0"), then airflow and serving depend on it
      - name: postgres
        helmChart: mlpipeline-postgres
        syncWave: "0"
      - name: airflow
        helmChart: mlpipeline-airflow
        syncWave: "1"
      - name: serving
        helmChart: mlpipeline-serving
        syncWave: "2"
      - name: oauth2proxy
        helmChart: mlpipeline-oauth2proxy
        syncWave: "2"

  template:
    metadata:
      name: mlpipeline-{{name}}
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      labels:
        app.kubernetes.io/name: mlpipeline
        app.kubernetes.io/component: "{{name}}"
        argocd.argoproj.io/instance: mlpipeline

    spec:
      project: mlpipeline-project

      source:
        repoURL: https://github.com/rawhideron/MLPipeline
        targetRevision: main
        path: helm/{{helmChart}}

        helm:
          releaseName: mlpipeline-{{name}}
          values: |
            replicaCount: 1
            namespace: mlpipeline
            domain: mlpipeline.duckdns.org

      destination:
        server: https://kubernetes.default.svc
        namespace: mlpipeline

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

---
# Notification trigger for component syncs
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  trigger.on-component-sync: |
    - when: sync_operation_status_unknown or sync_operation_failed or resource_status_unknown
      oncePer: app.status.operationState.finishedAt
      send: [app-sync-failed]
  
  trigger.on-component-health: |
    - when: app.status.health.status == 'Degraded'
      oncePer: 300s
      send: [app-health-degraded]
