model:
  name: distilbert-base-uncased
  pretrained: true
  hidden_size: 768
  num_labels: 2  # Binary classification: positive/negative
  dropout_rate: 0.1

training:
  epochs: 3
  batch_size: 2
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0

data:
  validation_split: 0.2
  test_split: 0.1
  max_length: 128
  dataset: "movie_reviews"  # HuggingFace Datasets

optimization:
  optimizer: "adam"
  scheduler: "linear"
  
output:
  model_path: "/models/trained_model"
  metrics_path: "/models/metrics.json"
  checkpoint_interval: 500
