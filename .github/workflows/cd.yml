name: CD

on:
  push:
    branches: [main]

jobs:
  notify-argocd:
    name: Notify ArgoCD
    runs-on: ubuntu-latest

    steps:
      - name: Trigger ArgoCD webhook
        # ArgoCD polls main every 3 minutes automatically.
        # If ARGOCD_WEBHOOK_URL secret is set, this step sends an immediate
        # push notification so ArgoCD syncs within seconds instead of minutes.
        # To set up: ArgoCD Settings → Webhooks → copy the URL → add as secret.
        if: ${{ secrets.ARGOCD_WEBHOOK_URL != '' }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.ARGOCD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}' \
          | grep -qE "^(200|204)$" && echo "Webhook delivered" || echo "Webhook skipped (non-2xx)"
