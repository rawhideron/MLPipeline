name: CD

on:
  push:
    branches: [main]

jobs:
  notify-argocd:
    name: Notify ArgoCD
    runs-on: ubuntu-latest

    steps:
      - name: Trigger ArgoCD webhook
        # ArgoCD polls main every 3 minutes automatically.
        # If ARGOCD_WEBHOOK_URL secret is set, this step sends an immediate
        # push notification so ArgoCD syncs within seconds instead of minutes.
        # To set up: ArgoCD Settings → Webhooks → copy the URL → add as secret.
        env:
          ARGOCD_WEBHOOK_URL: ${{ secrets.ARGOCD_WEBHOOK_URL }}
        run: |
          if [ -z "$ARGOCD_WEBHOOK_URL" ]; then
            echo "ARGOCD_WEBHOOK_URL not set — ArgoCD will sync via polling (up to 3 min)"
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$ARGOCD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref":"refs/heads/main","repository":{"html_url":"https://github.com/${{ github.repository }}"}}' \
          | grep -qE "^(200|204)$" && echo "Webhook delivered" || echo "Webhook failed"
