apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    app: airflow
    component: webserver
spec:
  replicas: {{ .Values.webserver.replicaCount }}
  selector:
    matchLabels:
      app: airflow
      component: webserver
  template:
    metadata:
      labels:
        app: airflow
        component: webserver
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.2.1
          args:
            - --repo=https://github.com/rawhideron/MLPipeline.git
            - --branch=main
            - --depth=1
            - --one-time
            - --root=/dags
            - --link=repo
          volumeMounts:
            - name: dags
              mountPath: /dags
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "waiting for postgresql..."; sleep 3
              done
      containers:
        - name: webserver
          image: {{ .Values.webserver.image.repository }}:{{ .Values.webserver.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
              name: webserver
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: AIRFLOW__CORE__EXECUTOR
              value: KubernetesExecutor
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/dags/repo/dags
            - name: AIRFLOW__WEBSERVER__BASE_URL
              value: "https://mlpipeline.duckdns.org/airflow"
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              value: "mlpipeline-secret-key-change-in-prod"
            - name: AIRFLOW__LOGGING__BASE_LOG_FOLDER
              value: {{ .Values.persistentVolume.logs.mountPath }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.webserver.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /airflow/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /airflow/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: {{ .Values.persistentVolume.logs.mountPath }}
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-dags
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-logs
