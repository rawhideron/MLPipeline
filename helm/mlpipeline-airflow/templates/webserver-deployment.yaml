apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    app: airflow
    component: webserver
spec:
  replicas: {{ .Values.webserver.replicaCount }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: airflow
      component: webserver
  template:
    metadata:
      labels:
        app: airflow
        component: webserver
      annotations:
        checksum/webserver-config: {{ include (print $.Template.BasePath "/webserver-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: airflow
      initContainers:
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.2.1
          args:
            - --repo=https://github.com/rawhideron/MLPipeline.git
            - --branch=main
            - --depth=1
            - --one-time
            - --root=/dags
            - --link=repo
          volumeMounts:
            - name: dags
              mountPath: /dags
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "waiting for postgresql..."; sleep 3
              done
      containers:
        - name: webserver
          image: {{ .Values.webserver.image.repository }}:{{ .Values.webserver.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["airflow", "api-server"]
          ports:
            - containerPort: 8080
              name: api-server
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: AIRFLOW__CORE__EXECUTOR
              value: KubernetesExecutor
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/dags/repo/dags
            - name: AIRFLOW__API__BASE_URL
              value: "https://mlpipeline.duckdns.org/airflow"
            - name: AIRFLOW__API__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-webserver-secret
                  key: secret-key
            - name: AIRFLOW__LOGGING__BASE_LOG_FOLDER
              value: {{ .Values.persistentVolume.logs.mountPath }}
            - name: AIRFLOW__CORE__AUTH_MANAGER
              value: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
            - name: AIRFLOW__WEBSERVER__CONFIG_FILE
              value: "/opt/airflow/webserver_config.py"
            - name: AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX
              value: "True"
            - name: AIRFLOW_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: airflow-keycloak-secret
                  key: client-secret
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.webserver.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: {{ .Values.persistentVolume.logs.mountPath }}
            - name: webserver-config
              mountPath: /opt/airflow/webserver_config.py
              subPath: webserver_config.py
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-dags
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-logs
        - name: webserver-config
          configMap:
            name: {{ .Release.Name }}-webserver-config
