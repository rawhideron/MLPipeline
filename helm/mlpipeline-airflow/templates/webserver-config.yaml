apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-webserver-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: airflow
    component: webserver
data:
  webserver_config.py: |
    import os
    from flask_appbuilder.security.manager import AUTH_OAUTH

    AUTH_TYPE = AUTH_OAUTH

    # Force HTTPS for OAuth redirect_uri generation (we're behind an SSL-terminating proxy)
    PREFERRED_URL_SCHEME = 'https'

    OAUTH_PROVIDERS = [{
        'name': 'keycloak',
        'token_key': 'access_token',
        'icon': 'fa-key',
        'remote_app': {
            'client_id': 'airflow',
            'client_secret': os.environ.get('AIRFLOW_KEYCLOAK_CLIENT_SECRET', ''),
            'server_metadata_url': 'https://goodmanreunion.duckdns.org/keycloak/realms/MLPipeline/.well-known/openid-configuration',
            'api_base_url': 'https://goodmanreunion.duckdns.org/keycloak/realms/MLPipeline/protocol/',
            'request_token_url': None,
            'access_token_url': 'https://goodmanreunion.duckdns.org/keycloak/realms/MLPipeline/protocol/openid-connect/token',
            'authorize_url': 'https://goodmanreunion.duckdns.org/keycloak/realms/MLPipeline/protocol/openid-connect/auth',
            'jwks_uri': 'https://goodmanreunion.duckdns.org/keycloak/realms/MLPipeline/protocol/openid-connect/certs',
            'redirect_uri': 'https://mlpipeline.duckdns.org/airflow/auth/oauth-authorized/keycloak',
        },
    }]

    AUTH_ROLE_ADMIN = 'Admin'
    AUTH_USER_REGISTRATION = True
    AUTH_USER_REGISTRATION_ROLE = 'Admin'
    AUTH_ROLES_SYNC_AT_LOGIN = True
