apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    app: airflow
    component: webserver
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: airflow
    component: webserver
