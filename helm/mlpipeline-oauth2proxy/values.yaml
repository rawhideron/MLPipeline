replicaCount: 1

image:
  repository: quay.io/oauth2-proxy/oauth2-proxy
  tag: "v7.6.0"
  pullPolicy: IfNotPresent

# Keycloak OIDC settings
oidc:
  issuerUrl: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local/realms/MLPipeline"
  clientId: "oauth2-proxy"

# Credentials are read from the oauth2-proxy-secrets Kubernetes secret
# Created manually: kubectl create secret generic oauth2-proxy-secrets
#   --from-literal=client-secret=<keycloak-client-secret>
#   --from-literal=cookie-secret=<32-byte-base64-value>
#   -n mlpipeline
credentialsSecret: oauth2-proxy-secrets

redirectUrl: "https://mlpipeline.duckdns.org/oauth2/callback"
cookieDomain: "mlpipeline.duckdns.org"

service:
  port: 4180

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
