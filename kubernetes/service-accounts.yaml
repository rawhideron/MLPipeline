apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow
  namespace: MLPipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: airflow
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlpipeline-serving
  namespace: MLPipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: serving
---
# RBAC - Role for Airflow to create pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-role
  namespace: MLPipeline
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/logs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
# RBAC - RoleBinding for Airflow
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-rolebinding
  namespace: MLPipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airflow-role
subjects:
  - kind: ServiceAccount
    name: airflow
    namespace: MLPipeline
---
# RBAC - Role for FastAPI serving
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mlpipeline-serving-role
  namespace: MLPipeline
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
# RBAC - RoleBinding for serving
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mlpipeline-serving-rolebinding
  namespace: MLPipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mlpipeline-serving-role
subjects:
  - kind: ServiceAccount
    name: mlpipeline-serving
    namespace: MLPipeline
