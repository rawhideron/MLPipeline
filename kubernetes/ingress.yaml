apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlpipeline-ingress
  namespace: mlpipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: "reunion-letsencrypt"
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.mlpipeline.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://mlpipeline.duckdns.org/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mlpipeline.duckdns.org
      secretName: mlpipeline-tls
  rules:
    - host: mlpipeline.duckdns.org
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mlpipeline-serving
                port:
                  number: 8000
---
# Unauthenticated ingress for health check only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlpipeline-ingress-public
  namespace: mlpipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: "reunion-letsencrypt"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mlpipeline.duckdns.org
      secretName: mlpipeline-tls
  rules:
    - host: mlpipeline.duckdns.org
      http:
        paths:
          - path: /airflow
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                port:
                  number: 8080
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
          - path: /health
            pathType: Exact
            backend:
              service:
                name: mlpipeline-serving
                port:
                  number: 8000
