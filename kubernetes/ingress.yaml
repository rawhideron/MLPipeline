apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlpipeline-ingress
  namespace: mlpipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-type: "oauth2"
    nginx.ingress.kubernetes.io/auth-signin: "https://keycloak:8080/realms/MLPipeline/protocol/openid-connect/auth"
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy/oauth2/auth"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mlpipeline.duckdns.org
      secretName: mlpipeline-tls
  rules:
    - host: mlpipeline.duckdns.org
      http:
        paths:
          - path: /airflow
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mlpipeline-serving
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: mlpipeline-serving
                port:
                  number: 8000
