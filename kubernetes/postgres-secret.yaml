apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: MLPipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: database
type: Opaque
stringData:
  username: airflow
  password: airflow_secure_password_change_me
  database: airflow
  # Full connection string
  db-url: postgresql://airflow:airflow_secure_password_change_me@mlpipeline-postgresql:5432/airflow
---
# Keycloak OAuth secrets
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-serving-secret
  namespace: MLPipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  client-id: mlpipeline-serving
  client-secret: serving_client_secret_change_me
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-airflow-secret
  namespace: MLPipeline
  labels:
    app.kubernetes.io/name: mlpipeline
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  client-id: airflow-webserver
  client-secret: airflow_client_secret_change_me
